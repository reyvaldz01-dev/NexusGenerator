<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Key System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f, #0d1117);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 40px; padding: 20px 0; }
        .logo { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #ff0000, #ff4444); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subtitle { color: rgba(255,255,255,0.5); margin-top: 8px; font-size: 14px; }
        
        /* Glass Card */
        .glass-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: #ff0000; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); }
        .input-group input { width: 100%; padding: 14px; background: rgba(20,20,30,0.9); border: 1px solid rgba(255,0,0,0.3); border-radius: 20px; color: white; font-size: 14px; }
        .input-group input:focus { outline: none; border-color: #ff0000; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, #ff0000, #cc0000); color: white; }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,0,0,0.4); color: #ff0000; }
        
        .timer { font-size: 48px; font-weight: 800; text-align: center; color: #ff0000; font-family: monospace; margin: 20px 0; }
        .steps-container { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
        .step { flex: 1; text-align: center; padding: 12px; background: rgba(20,20,30,0.5); border-radius: 20px; border: 1px solid rgba(255,0,0,0.2); }
        .step.completed { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .step.active { border-color: #ff0000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } }
        .step-number { font-size: 24px; font-weight: 800; }
        .step-label { font-size: 10px; color: rgba(255,255,255,0.5); }
        
        .key-result { background: linear-gradient(135deg, rgba(255,0,0,0.1), rgba(0,0,0,0.3)); border-radius: 24px; padding: 20px; text-align: center; border: 1px solid rgba(255,0,0,0.3); }
        .key-value { font-family: monospace; font-size: 16px; font-weight: 700; color: #ff0000; background: rgba(0,0,0,0.5); padding: 16px; border-radius: 16px; word-break: break-all; }
        
        .alert { padding: 12px; border-radius: 16px; margin-top: 16px; font-size: 13px; }
        .alert-success { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
        .alert-error { background: rgba(255,0,0,0.1); border: 1px solid #ff0000; color: #ff0000; }
        .alert-info { background: rgba(255,0,0,0.05); border: 1px solid rgba(255,0,0,0.3); color: rgba(255,255,255,0.8); }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(255,0,0,0.3); border-top-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .announcement-bar { background: linear-gradient(135deg, #ff0000, #cc0000); padding: 12px 20px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; }
        .announcement-title { font-weight: 700; margin-bottom: 4px; }
        .announcement-content { font-size: 12px; opacity: 0.9; }
        
        @media (max-width: 600px) { .container { padding: 16px; } .step-number { font-size: 18px; } .timer { font-size: 36px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✦ NEXUS</div>
            <div class="subtitle">Free Key Generator • 2-Step Challenge</div>
        </div>

        <!-- Announcements -->
        <div id="announcementsContainer"></div>

        <!-- User Info Card -->
        <div class="glass-card" id="userCard">
            <div class="card-title"><i class="fas fa-user-astronaut"></i> Identity Verification</div>
            <div class="input-group">
                <label>Telegram Username / User ID</label>
                <input type="text" id="userId" placeholder="@username or userid">
            </div>
            <button class="btn btn-primary" onclick="startChallenge()"><i class="fas fa-rocket"></i> Start 2-Step Challenge</button>
            <div id="userMsg"></div>
        </div>

        <!-- Challenge Card -->
        <div class="glass-card" id="challengeCard" style="display: none;">
            <div class="card-title"><i class="fas fa-tasks"></i> Challenge Progress</div>
            <div class="steps-container" id="stepsDisplay"></div>
            <div id="stepContent"></div>
        </div>

        <!-- My Active Key Card -->
        <div class="glass-card" id="myKeyCard">
            <div class="card-title"><i class="fas fa-key"></i> My Active Key</div>
            <div id="myKeyContent"><div style="text-align:center; padding:20px;"><div class="loading-spinner" style="width:30px; height:30px;"></div> Loading...</div></div>
        </div>

        <!-- Footer Links -->
        <div style="text-align: center; margin-top: 20px;">
            <a href="#" onclick="joinTelegram()" style="color: #ff0000; text-decoration: none; margin: 0 10px;">Join Telegram</a>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>

    <script>
        const API_BASE = 'https://system-nexus-key.vercel.app';
        let currentUserId = null;
        let currentStep = 1;
        let timerInterval = null;

        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function showToast(message, type) { alert(message); }

        async function loadAnnouncements() {
            try {
                const res = await fetch(`${API_BASE}/api/announcements`);
                const data = await res.json();
                if (data.success && data.announcements && data.announcements.length > 0) {
                    const container = document.getElementById('announcementsContainer');
                    container.innerHTML = data.announcements.map(a => `
                        <div class="announcement-bar">
                            <div class="announcement-title">📢 ${a.title}</div>
                            <div class="announcement-content">${a.content}</div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function loadMyKey() {
            const userId = localStorage.getItem('nexus_user');
            if (!userId) {
                document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info">Complete the challenge to get your free key!</div>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/my-key/${userId}`);
                const data = await res.json();
                if (data.hasKey) {
                    document.getElementById('myKeyContent').innerHTML = `
                        <div class="key-result">
                            <div class="key-value"><i class="fas fa-key"></i> ${data.key}</div>
                            <div style="margin-top: 12px;"><span class="alert-success" style="padding: 4px 12px;">${data.remaining}</span></div>
                            <button class="btn btn-primary" style="margin-top: 12px; width: auto; padding: 8px 20px;" onclick="copyKey('${data.key}')">Copy Key</button>
                        </div>
                    `;
                } else {
                    document.getElementById('myKeyContent').innerHTML = '<div class="alert alert-info">No active key. Start the challenge to get one!</div>';
                }
            } catch(e) { console.error(e); }
        }

        function copyKey(key) { navigator.clipboard.writeText(key); alert('Key copied!'); }

        async function startChallenge() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) { alert('Please enter your Telegram username'); return; }
            currentUserId = userId;
            localStorage.setItem('nexus_user', userId);
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/start`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('userCard').style.display = 'none';
                    document.getElementById('challengeCard').style.display = 'block';
                    currentStep = 1;
                    showStep1();
                } else if (data.error && data.error.includes('already have an active key')) {
                    alert(data.error);
                    document.getElementById('userCard').style.display = 'none';
                    loadMyKey();
                } else { alert(data.error); }
            } catch(err) { alert('Network error'); } finally { showLoading(false); }
        }

        function updateStepsDisplay() {
            document.getElementById('stepsDisplay').innerHTML = [1,2].map(step => `
                <div class="step ${step < currentStep ? 'completed' : (step === currentStep ? 'active' : '')}">
                    <div class="step-number">${step}</div>
                    <div class="step-label">Step ${step}</div>
                </div>
            `).join('');
        }

        async function showStep1() {
            updateStepsDisplay();
            document.getElementById('stepContent').innerHTML = `<div class="timer" id="timer1">20s</div><button id="step1Btn" class="btn btn-primary" onclick="completeStep1()" disabled>Please wait 20 seconds...</button>`;
            let timeLeft = 20;
            const timerEl = document.getElementById('timer1');
            const btnEl = document.getElementById('step1Btn');
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { timeLeft--; timerEl.innerHTML = `${timeLeft}s`; if (timeLeft <= 0) { clearInterval(timerInterval); timerEl.innerHTML = '✅ Ready!'; btnEl.disabled = false; btnEl.innerHTML = 'Complete Step 1'; btnEl.classList.add('btn-primary'); } }, 1000);
        }

        async function completeStep1() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/step1`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId }) });
                const data = await res.json();
                if (data.success || data.alreadyCompleted) { currentStep = 2; showStep2(); }
                else { alert(data.error); }
            } catch(err) { alert('Error'); } finally { showLoading(false); }
        }

        async function showStep2() {
            updateStepsDisplay();
            document.getElementById('stepContent').innerHTML = `<div class="timer" id="timer2">100s</div><button id="step2Btn" class="btn btn-primary" onclick="completeStep2()" disabled>Please wait 100 seconds...</button>`;
            let timeLeft = 100;
            const timerEl = document.getElementById('timer2');
            const btnEl = document.getElementById('step2Btn');
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { timeLeft--; timerEl.innerHTML = `${timeLeft}s`; if (timeLeft <= 0) { clearInterval(timerInterval); timerEl.innerHTML = '✅ Ready!'; btnEl.disabled = false; btnEl.innerHTML = 'Complete Step 2'; btnEl.classList.add('btn-primary'); } }, 1000);
        }

        async function completeStep2() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/step2`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId }) });
                const data = await res.json();
                if (data.success || data.alreadyCompleted) { await claimKey(); }
                else { alert(data.error); }
            } catch(err) { alert('Error'); } finally { showLoading(false); }
        }

        async function claimKey() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/claim`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId, durationHours: 3 }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('challengeCard').innerHTML = `
                        <div class="card-title"><i class="fas fa-trophy"></i> Congratulations!</div>
                        <div class="key-result">
                            <div class="key-value">${data.key}</div>
                            <div style="margin: 12px 0;"><span class="alert-success">${data.duration} Hours</span></div>
                            <button class="btn btn-primary" onclick="copyKey('${data.key}')">Copy Key</button>
                            <button class="btn btn-outline" style="margin-top: 12px;" onclick="location.reload()">Get Another Key</button>
                        </div>
                    `;
                    loadMyKey();
                } else { alert(data.error); }
            } catch(err) { alert('Error'); } finally { showLoading(false); }
        }

        function joinTelegram() { window.open('https://t.me/ScolariChannel', '_blank'); }

        loadAnnouncements();
        loadMyKey();
    </script>
</body>
</html>
